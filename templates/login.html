{% extends "base.html" %}
{% block title %}Login — Quantum Voting{% endblock %}

{% block extra_css %}
<style>
  .auth-header { text-align: center; margin-bottom: 2rem; }
  .auth-header .icon { font-size: 3rem; display: block; margin-bottom: .5rem; }
  .auth-footer { text-align: center; margin-top: 1.5rem; font-size: .88rem; color: var(--muted); }
  .auth-footer a { color: var(--accent2); text-decoration: none; }
  .auth-footer a:hover { text-decoration: underline; }

  /* subtle entrance animation */
  .card { animation: fadeUp .4s ease both; }
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(16px); }
    to   { opacity:1; transform: translateY(0); }
  }
</style>
{% endblock %}

{% block content %}
<div class="card" style="max-width:420px;margin:0 auto;">
  <div class="auth-header">
    <span class="icon">🔐</span>
    <h1>Sign In</h1>
    <p class="subtitle">Enter the quantum voting chamber</p>
  </div>

  <form method="POST" action="{{ url_for('login') }}">
    <label for="username">Username</label>
    <input type="text" id="username" name="username"
           placeholder="your_username" required autocomplete="username" />

    <label for="password">Password</label>
    <input type="password" id="password" name="password"
           placeholder="••••••••" required autocomplete="current-password" />

    <button type="submit" class="btn btn-primary btn-full" style="margin-top:.5rem;">
      LOGIN →
    </button>
  </form>

  <p class="auth-footer">
    No account yet?
    <a href="{{ url_for('register') }}">Create one</a>
  </p>
</div>
{% endblock %}
